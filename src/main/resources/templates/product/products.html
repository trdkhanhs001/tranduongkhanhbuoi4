<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{layout :: navbar}"></div>

    <div class="container mt-4">
        <h2>Products</h2>

        <a th:href="@{/products/create}" class="btn btn-success mb-3">Create New Product</a>

        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Image</th>
                    <th>Category Name</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="product, iterStat : ${products}">
                    <td th:text="${iterStat.count}"></td>
                    <td th:text="${product.name}"></td>
                    <td th:text="${product.price}"></td>
                    <td>
                        <img th:if="${product.imageFileName != null and !product.imageFileName.isEmpty()}"
                             th:src="@{'/uploads/' + ${product.imageFileName}}"
                             alt="Product Image"
                             style="max-width: 120px; max-height: 100px;">
                    </td>
                    <td>
                        <span th:each="cat : ${categories}"
                              th:if="${cat.id == product.categoryId}"
                              th:text="${cat.name}"></span>
                    </td>
                    <td>
                        <a th:href="@{'/products/edit/' + ${product.id}}" class="btn btn-sm btn-primary">Edit</a>
                        <form th:action="@{'/products/delete/' + ${product.id}}" method="post" style="display:inline">
                            <button type="submit" class="btn btn-sm btn-danger"
                                    onclick="return confirm('Bạn có chắc muốn xóa?')">Delete</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(products)}">
                    <td colspan="6" class="text-center">Không có sản phẩm nào.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div th:replace="~{layout :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
